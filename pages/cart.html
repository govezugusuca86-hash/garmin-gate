<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — Velgar</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="header">
  <div class="header-top">🚚 Бесплатная доставка в Москве, СПБ, Екатеринбурге &nbsp;|&nbsp; 8 800 333-57-82</div>
  <div class="container">
    <div class="header-main">
      <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
      <a href="../index.html" class="header-logo">Vel<span>gar</span></a>
      <nav class="header-nav">
        <a href="../index.html">Каталог</a>
        <a href="../index.html?cat=1">Часы</a>
        <a href="../index.html?cat=4">Велокомпьютеры</a>
        <a href="../index.html?cat=9">Навигаторы</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="btn-icon">
          <svg width="22" height="22" viewBox="0 0 34 34" fill="none" stroke="#2f5ed7" stroke-width="2"><path d="M5 15C5 13.9 5.9 13 7 13h20c1.1 0 2 .9 2 2v13c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V15z"/><path d="M23 12V8c0-1.7-1.3-3-3-3h-6C12.3 5 11 6.3 11 8v4"/></svg>
          <span class="badge cart-badge" style="display:none">0</span>
        </a>
      </div>
    </div>
  </div>
  <nav class="mobile-menu" id="mobileMenu">
    <a href="../index.html">🏠 Главная</a>
    <a href="cart.html">🛒 Корзина</a>
    <a href="checkout.html">✅ Оформить заказ</a>
  </nav>
</header>

<div class="header-padding"></div>

<main class="cart-page container">
  <div class="breadcrumb">
    <a href="../index.html">Главная</a>
    <span class="sep">›</span>
    <span>Корзина</span>
  </div>
  <h1 style="font-size:32px;margin-bottom:32px;">Корзина</h1>
  <div id="cartContent"></div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>2024–2026 © Velgar</span>
      <a href="../index.html" style="color:#2f5ed7;font-weight:700;">← Продолжить покупки</a>
    </div>
  </div>
</footer>

<script src="../js/products.js"></script>
<script src="../js/app.js"></script>
<script>
function renderCart() {
  const cart = Cart.get();
  const el = document.getElementById('cartContent');

  if (cart.length === 0) {
    el.innerHTML = `
      <div class="cart-empty">
        <div style="font-size:64px;margin-bottom:16px;">🛒</div>
        <h2>Корзина пуста</h2>
        <p>Добавьте товары из каталога</p>
        <a href="../index.html" class="btn-primary" style="display:inline-flex;">Перейти в каталог</a>
      </div>`;
    return;
  }

  const total = Cart.total();
  const oldTotal = cart.reduce((s, i) => {
    const p = PRODUCTS_DATA.products.find(x => x.id === i.id);
    return s + (p?.oldprice || p?.price || i.price) * i.qty;
  }, 0);
  const savings = oldTotal - total;

  el.innerHTML = `
    <div class="cart-layout">
      <div>
        <div id="cartItems"></div>
        <div style="margin-top:16px;">
          <button onclick="Cart.clear();renderCart();" style="font-family:var(--font);font-size:12px;color:#969696;cursor:pointer;border:none;background:none;text-decoration:underline;">Очистить корзину</button>
        </div>
      </div>
      <div class="cart-summary">
        <h3>Итого</h3>
        <div class="summary-row"><span>Товаров:</span><span>${cart.reduce((s,i)=>s+i.qty,0)} шт.</span></div>
        ${savings > 0 ? `<div class="summary-row" style="color:#f02424;"><span>Экономия:</span><span>-${formatPrice(savings)}</span></div>` : ''}
        <div class="summary-row summary-total"><span>Сумма:</span><span>${formatPrice(total)}</span></div>
        <a href="https://vk.me/velgar_shop" target="_blank" class="btn-checkout">Оформить заказ в VK</a>
        <div style="font-size:11px;color:#969696;margin-top:12px;text-align:center;">
          🔒 Безопасная оплата &nbsp;·&nbsp; 🛡️ Гарантия возврата
        </div>
      </div>
    </div>`;

  document.getElementById('cartItems').innerHTML = cart.map(item => {
    const p = PRODUCTS_DATA.products.find(x => x.id === item.id);
    const pic = p?.picture || item.picture;
    return `
      <div class="cart-item">
        <img class="cart-item-img" src="${pic}" alt="${item.name}" onerror="this.style.display='none'">
        <div>
          <div class="cart-item-brand">${item.brand}</div>
          <div class="cart-item-name"><a href="product.html?id=${item.id}" style="color:inherit;">${item.name}</a></div>
          <div style="margin-top:8px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
            </div>
            <div class="cart-item-price">${formatPrice(item.price * item.qty)}</div>
            <button class="cart-item-remove" onclick="removeItem('${item.id}')" title="Удалить">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function changeQty(id, delta) {
  const cart = Cart.get();
  const idx = cart.findIndex(i => i.id === id);
  if (idx >= 0) {
    cart[idx].qty = Math.max(1, cart[idx].qty + delta);
    Cart.save(cart);
    renderCart();
  }
}

function removeItem(id) {
  Cart.remove(id);
  renderCart();
}

document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
