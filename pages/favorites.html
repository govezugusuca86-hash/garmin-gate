<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Избранное — GarminGate</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="header">
  <div class="header-top">🚚 Бесплатная доставка в Москве, СПБ, Екатеринбурге &nbsp;|&nbsp; 8 800 333-57-82</div>
  <div class="container">
    <div class="header-main">
      <a href="../index.html" class="header-logo">Garmin<span>Gate</span></a>
      <nav class="header-nav">
        <a href="../index.html">Каталог</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="btn-icon">
          <svg width="22" height="22" viewBox="0 0 34 34" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 15C5 13.9 5.9 13 7 13h20c1.1 0 2 .9 2 2v13c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V15z"/><path d="M23 12V8c0-1.7-1.3-3-3-3h-6C12.3 5 11 6.3 11 8v4"/></svg>
          <span class="badge cart-badge" style="display:none">0</span>
        </a>
      </div>
    </div>
  </div>
</header>
<div class="header-padding"></div>
<main class="container" style="padding:40px 0 60px;">
  <div class="breadcrumb">
    <a href="../index.html">Главная</a>
    <span class="sep">›</span>
    <span>Избранное</span>
  </div>
  <h1 style="font-size:32px;margin-bottom:32px;">Избранное</h1>
  <div id="favsContent"></div>
</main>
<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>2024–2026 © GarminGate</span>
      <a href="../index.html" style="color:#2f5ed7;font-weight:700;">← В каталог</a>
    </div>
  </div>
</footer>
<script src="../js/products.js"></script>
<script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const favIds = Favs.get();
  const el = document.getElementById('favsContent');
  if (favIds.length === 0) {
    el.innerHTML = `<div class="cart-empty"><div style="font-size:48px;">💙</div><h2>Список избранного пуст</h2><p>Добавляйте понравившиеся товары в избранное</p><a href="../index.html" class="btn-primary" style="display:inline-flex;margin-top:16px;">В каталог</a></div>`;
    return;
  }
  const favProducts = PRODUCTS_DATA.products.filter(p => favIds.includes(p.id));
  el.innerHTML = `<div class="products-grid">${favProducts.map(renderCard).join('')}</div>`;
});
</script>
</body>
</html>
