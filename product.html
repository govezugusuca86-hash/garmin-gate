<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товар — GarminGate</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    🚚 Бесплатная доставка в Москве, СПБ, Екатеринбурге &nbsp;|&nbsp; 8 800 333-57-82
  </div>
  <div class="container">
    <div class="header-main">
      <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </div>
      <a href="../index.html" class="header-logo">Garmin<span>Gate</span></a>
      <nav class="header-nav">
        <a href="../index.html">Каталог</a>
        <a href="../index.html?cat=1">Часы</a>
        <a href="../index.html?cat=4">Велокомпьютеры</a>
        <a href="../index.html?cat=9">Навигаторы</a>
        <a href="../index.html?cat=3">Дайвинг</a>
        <a href="../index.html?sale=1" style="color:#f02424;">Распродажа</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="btn-icon" title="Корзина">
          <svg width="22" height="22" viewBox="0 0 34 34" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 15C5 13.9 5.9 13 7 13h20c1.1 0 2 .9 2 2v13c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V15z"/><path d="M23 12V8c0-1.7-1.3-3-3-3h-6C12.3 5 11 6.3 11 8v4"/></svg>
          <span class="badge cart-badge" style="display:none">0</span>
        </a>
        <a href="favorites.html" class="btn-icon" title="Избранное">
          <svg width="22" height="22" viewBox="0 0 20 19" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.33 2.8L10 3.41l.67-.61C12.6 1.05 15.58 1.11 17.43 2.99c1.93 1.95 1.93 5.12 0 7.07L10.69 16.89c-.38.38-.99.38-1.37 0L2.56 10.06C.64 8.11.64 4.94 2.56 2.99 4.42 1.11 7.39 1.05 9.33 2.8z"/></svg>
        </a>
      </div>
    </div>
  </div>
  <nav class="mobile-menu" id="mobileMenu">
    <a href="../index.html">🏠 Главная</a>
    <a href="../index.html?cat=1">⌚ Спортивные часы</a>
    <a href="../index.html?cat=2">💓 Пульсометры</a>
    <a href="../index.html?cat=4">🚴 Велокомпьютеры</a>
    <a href="cart.html">🛒 Корзина</a>
  </nav>
</header>

<div class="header-padding"></div>

<main class="product-page container" id="productPage">
  <div style="text-align:center;padding:80px 0;color:#969696;">Загрузка...</div>
</main>

<!-- Related products -->
<section class="container" style="padding-bottom:60px;" id="relatedSection" style="display:none;">
  <h2 class="section-title">Похожие товары</h2>
  <div class="products-grid" id="relatedGrid" style="margin-top:24px;"></div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>2024–2026 © GarminGate</span>
      <a href="../index.html" style="color:#2f5ed7;font-weight:700;">← Вернуться в каталог</a>
    </div>
  </div>
</footer>

<script src="../js/products.js"></script>
<script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const product = PRODUCTS_DATA.products.find(p => p.id === id);
  const page = document.getElementById('productPage');

  if (!product) {
    page.innerHTML = '<div style="text-align:center;padding:80px;"><h2>Товар не найден</h2><a href="../index.html" style="color:#2f5ed7;">← Вернуться</a></div>';
    return;
  }

  document.title = product.name + ' — GarminGate';
  const hasDiscount = product.oldprice && product.oldprice > product.price;
  const discount = hasDiscount ? Math.round((1 - product.price / product.oldprice) * 100) : 0;
  const catName = PRODUCTS_DATA.categories[product.categoryId] || 'Каталог';
  const isFav = Favs.has(product.id);
  const inCart = Cart.get().find(i => i.id === product.id);

  // Create pictures array (we only store first picture in JSON, so show it)
  const pics = [product.picture].filter(Boolean);

  page.innerHTML = `
    <div class="breadcrumb">
      <a href="../index.html">Главная</a>
      <span class="sep">›</span>
      <a href="../index.html?cat=${product.categoryId}">${catName}</a>
      <span class="sep">›</span>
      <span>${product.name}</span>
    </div>
    <div class="product-detail">
      <div class="product-gallery">
        <div class="gallery-main">
          <img src="${product.picture}" alt="${product.name}" id="mainImg">
        </div>
      </div>
      <div class="product-info">
        <div class="product-brand">${product.brand}</div>
        <h1>${product.name}</h1>
        ${hasDiscount ? `<div style="display:inline-block;background:#f02424;color:#fff;font-size:12px;font-weight:800;padding:3px 8px;margin-bottom:8px;">Скидка ${discount}%</div>` : ''}
        <div class="product-price">
          <span class="price-current ${hasDiscount ? 'discounted' : ''}">${formatPrice(product.price)}</span>
          ${hasDiscount ? `<span class="price-old">${formatPrice(product.oldprice)}</span>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;padding:16px;background:#f6f6f6;font-size:13px;font-weight:600;">
          <div>✅ В наличии</div>
          <div>🚚 Доставка в день заказа (Москва, СПб, Екб)</div>
          <div>🛡️ Официальная гарантия 1–2 года</div>
          <div>💳 Рассрочка 0% от банков</div>
        </div>
        <div class="product-actions">
          <button class="btn-cart ${inCart ? 'in-cart' : ''}" id="addToCartBtn" style="font-size:15px;height:52px;" onclick="handleAddToCart('${product.id}')">
            ${inCart ? '✓ В корзине' : 'В корзину'}
          </button>
          <button style="width:52px;height:52px;border:1px solid #ececec;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;" onclick="handleFav('${product.id}', this)" title="В избранное">
            <svg width="20" height="20" viewBox="0 0 20 19" fill="${isFav ? '#2f5ed7' : 'none'}" stroke="${isFav ? '#2f5ed7' : '#969696'}" stroke-width="2">
              <path d="M9.33 2.8L10 3.41l.67-.61C12.6 1.05 15.58 1.11 17.43 2.99c1.93 1.95 1.93 5.12 0 7.07L10.69 16.89c-.38.38-.99.38-1.37 0L2.56 10.06C.64 8.11.64 4.94 2.56 2.99 4.42 1.11 7.39 1.05 9.33 2.8z"/>
            </svg>
          </button>
        </div>
        <a href="cart.html" style="display:block;text-align:center;padding:14px;border:2px solid #2f5ed7;color:#2f5ed7;font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;margin-top:0;transition:all 0.2s;" onmouseover="this.style.background='#2f5ed7';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='#2f5ed7'">
          Перейти в корзину
        </a>
      </div>
    </div>
    <div class="product-tabs">
      <div class="tab-btns">
        <button class="tab-btn active" onclick="showTab('desc', this)">Описание</button>
        <button class="tab-btn" onclick="showTab('delivery', this)">Доставка и оплата</button>
        <button class="tab-btn" onclick="showTab('guarantee', this)">Гарантия</button>
      </div>
      <div id="tab-desc" class="tab-content active">
        <p style="white-space:pre-line;font-size:14px;line-height:1.8;color:#333;">Подробное описание данного товара доступно на сайте производителя. Это профессиональное устройство бренда ${product.brand} для спорта и активного образа жизни.</p>
      </div>
      <div id="tab-delivery" class="tab-content">
        <p><strong>Доставка:</strong></p>
        <p>• Москва, Санкт-Петербург, Екатеринбург — доставка в день заказа, бесплатно</p>
        <p>• По России — 2–5 рабочих дней, от 350 ₽</p>
        <p>• Самовывоз из наших магазинов — бесплатно</p>
        <p><strong>Оплата:</strong></p>
        <p>• Банковской картой онлайн</p>
        <p>• Рассрочка 0% от ведущих банков</p>
        <p>• Наличными при получении</p>
      </div>
      <div id="tab-guarantee" class="tab-content">
        <p>Официальная гарантия 1–2 года от производителя. Мы являемся официальными дилерами, поэтому вся продукция в магазине продаётся только с официальной гарантией в России.</p>
        <p>Гарантийное обслуживание осуществляется в авторизованных сервисных центрах.</p>
      </div>
    </div>
  `;

  // Related products
  const related = PRODUCTS_DATA.products
    .filter(p => p.categoryId === product.categoryId && p.id !== product.id)
    .slice(0, 8);
  if (related.length > 0) {
    document.getElementById('relatedSection').style.display = 'block';
    document.getElementById('relatedGrid').innerHTML = related.map(renderCard).join('');
  }
});

function handleAddToCart(id) {
  const p = PRODUCTS_DATA.products.find(x => x.id === id);
  if (!p) return;
  Cart.add(p);
  const btn = document.getElementById('addToCartBtn');
  btn.classList.add('in-cart');
  btn.textContent = '✓ В корзине';
}

function handleFav(id, btn) {
  const active = Favs.toggle(id);
  btn.querySelector('svg').setAttribute('fill', active ? '#2f5ed7' : 'none');
  btn.querySelector('svg').setAttribute('stroke', active ? '#2f5ed7' : '#969696');
  showToast(active ? 'Добавлено в избранное' : 'Удалено из избранного');
}

function showTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
}
</script>
</body>
</html>
